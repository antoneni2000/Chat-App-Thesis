# ===== Server =====
server.port=8081

# ===== Database =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatapp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Google Cloud Storage (GCS) =====
app.gcs.project-id=${GCS_PROJECT_ID:chat-app-497015}
app.gcs.bucket=${GCS_BUCKET:chatapp-attachments-2026}
app.gcs.credentials-path=${GCS_CREDENTIALS_PATH:C:/Users/nenis/OneDrive/Desktop/Chat App/backend/gcs-credentials.json}
app.gcs.signed-url-expiry-days=${GCS_SIGNED_URL_EXPIRY_DAYS:7}

# ===== Google OAuth =====
app.google.client-id=${GOOGLE_CLIENT_ID:550776314758-4ipg0qft3thhuv29h389q6l8b68imbah.apps.googleusercontent.com}

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForChatAppDoNotUseInProduction12345}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== Upload limits =====
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB

# ===== Logging =====
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.com.chatapp=${LOG_LEVEL_APP:INFO}

# ===== Cleanup & Maintenance =====
app.cleanup.retention-days=${CLEANUP_RETENTION_DAYS:30}
spring.task.scheduling.enabled=true
spring.task.scheduling.thread-name-prefix=cleanup-
spring.task.scheduling.pool.size=2
